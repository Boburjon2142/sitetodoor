{% if page_obj.has_other_pages %}
  <div class="pagination-row">
    {% if page_obj.has_previous %}
      <a class="btn btn-soft" href="?page={{ page_obj.previous_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}">Oldingi</a>
    {% endif %}
    <span>{{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
      <a class="btn btn-soft" href="?page={{ page_obj.next_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}">Yana yuklash</a>
    {% endif %}
  </div>
{% endif %}
