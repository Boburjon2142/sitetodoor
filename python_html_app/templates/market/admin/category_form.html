{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card form-card">
  <h1>{{ title }}</h1>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-field">
        <label>{{ field.label }}</label>
        {{ field }}
      </div>
    {% endfor %}
    <button class="btn" type="submit">Saqlash</button>
  </form>
</div>
{% endblock %}
