{% extends "base.html" %}
{% block title %}Yangi mahsulot{% endblock %}
{% block content %}
<section class="card form-wrap glass">
  <p class="badge">Admin forma</p>
  <h1>Yangi mahsulot qo'shish</h1>
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="{{ url_for('create_product') }}" class="col gap-sm">
    <label>
      Nomi
      <input class="field" type="text" name="name" required />
    </label>
    <label>
      Kategoriya
      <input class="field" type="text" name="category" required />
    </label>
    <label>
      Narx (UZS)
      <input class="field" type="number" min="1" name="price" required />
    </label>
    <label>
      Rasm URL (ixtiyoriy)
      <input class="field" type="url" name="image" placeholder="https://..." />
    </label>
    <button class="btn" type="submit">Saqlash</button>
  </form>
</section>
{% endblock %}
