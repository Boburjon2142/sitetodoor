{% extends "base.html" %}
{% block title %}Mahsulot{% endblock %}
{% block content %}
<article class="card detail glass">
  <img class="detail-image" src="{{ product.image }}" alt="{{ product.name }}" />
  <p class="badge">Mahsulot kartasi</p>
  <h1>{{ product.name }}</h1>
  <p class="muted">Kategoriya: {{ product.category }}</p>
  <p class="price">{{ "{:,}".format(product.price).replace(",", " ") }} UZS</p>
  <div class="row gap-sm wrap">
    <a class="btn" href="{{ url_for('home') }}">Orqaga</a>
    <a class="btn-ghost" href="{{ url_for('create_form') }}">Yangi mahsulot qo'shish</a>
  </div>
</article>
{% endblock %}
