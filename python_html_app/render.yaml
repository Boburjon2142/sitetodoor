services:
  - type: web
    name: site-to-door-uz
    env: python
    rootDir: python_html_app
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed_marketplace && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: site-to-door-uz.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://site-to-door-uz.onrender.com
